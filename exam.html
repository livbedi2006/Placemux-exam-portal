<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adaptive Assessment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #492e6e;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 680px;
    }

    /* --- Start Screen --- */
    #start-screen h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #ffffff;
    }

    #start-screen p {
      color: #8b8fa8;
      margin-bottom: 32px;
      font-size: 15px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #8b8fa8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, input {
      width: 100%;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input:focus {
      border-color: #6366f1;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #5254cc; }
    .btn-primary:disabled { background: #3a3d55; cursor: not-allowed; }

    /* --- Quiz Screen --- */
    #quiz-screen { display: none; }

    .quiz-layout {
      position: relative;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .band-badge {
      background: #6366f120;
      border: 1px solid #6366f140;
      color: #a5b4fc;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .score-label {
      font-size: 13px;
      color: #8b8fa8;
    }

    .question-text {
      font-size: 19px;
      font-weight: 500;
      line-height: 1.6;
      color: #ffffff;
      margin-bottom: 28px;
    }

    .options-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 18px;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      color: #e8e8e8;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.5;
    }

    .option-btn:hover:not(:disabled) {
      border-color: #6366f1;
      background: #6366f110;
    }

    .option-btn .letter {
      min-width: 26px;
      height: 26px;
      border-radius: 6px;
      background: #2a2d3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #8b8fa8;
      flex-shrink: 0;
    }

    .option-btn.correct {
      border-color: #22c55e;
      background: #22c55e10;
    }

    .option-btn.correct .letter {
      background: #22c55e;
      color: white;
    }

    .option-btn.wrong {
      border-color: #ef4444;
      background: #ef444410;
    }

    .option-btn.wrong .letter {
      background: #ef4444;
      color: white;
    }

    .option-btn:disabled { cursor: default; }

    .feedback-row {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 15px;
      font-weight: 500;
    }

    .feedback-row.correct { color: #22c55e; }
    .feedback-row.wrong { color: #ef4444; }

    .next-btn {
      width: 100%;
      padding: 14px;
      background: #1a1d27;
      border: 1px solid #6366f1;
      color: #a5b4fc;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: all 0.2s;
    }

    .next-btn:hover { background: #6366f120; }

    /* --- Proctoring Webcam Panel --- */
    .proctoring-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: none;
    }

    .webcam-container {
      position: relative;
      width: 200px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #2a2d3a;
      background: #0f1117;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .webcam-container video {
      width: 100%;
      display: block;
      transform: scaleX(-1);
    }

    .webcam-status {
      position: absolute;
      top: 8px;
      left: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.6);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #22c55e;
    }

    .webcam-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .webcam-status.warning {
      color: #f59e0b;
    }
    .webcam-status.warning .dot {
      background: #f59e0b;
    }

    .webcam-status.danger {
      color: #ef4444;
    }
    .webcam-status.danger .dot {
      background: #ef4444;
      animation: pulse-dot 0.5s infinite;
    }

    /* --- Violation Toasts --- */
    .violation-toast-container {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .violation-toast {
      background: rgba(239, 68, 68, 0.95);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toast-in 0.3s ease-out, toast-out 0.3s ease-in 2.7s forwards;
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
    }

    .violation-toast.medium {
      background: rgba(245, 158, 11, 0.95);
      box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3);
    }

    .violation-toast.low {
      background: rgba(99, 102, 241, 0.95);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toast-out {
      from { opacity: 1; }
      to { opacity: 0; transform: translateY(-10px); }
    }

    /* Violation counter badge on webcam */
    .violation-counter {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: #ef4444;
      color: white;
      min-width: 24px;
      height: 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      padding: 0 6px;
      display: none;
    }

    /* --- Report Screen --- */
    #report-screen { display: none; }

    #report-screen h2 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .score-big {
      font-size: 56px;
      font-weight: 800;
      color: #6366f1;
      line-height: 1;
      margin: 20px 0 4px;
    }

    .performance-label {
      font-size: 18px;
      font-weight: 600;
      color: #a5b4fc;
      margin-bottom: 28px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-box {
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 16px;
    }

    .stat-box .stat-label {
      font-size: 12px;
      color: #8b8fa8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .stat-box .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
    }

    .section-title {
      font-size: 13px;
      color: #8b8fa8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #2a2d3a;
      font-size: 14px;
    }

    .breakdown-item:last-child { border-bottom: none; }

    .breakdown-item .topic-name { color: #e8e8e8; }

    .breakdown-item .topic-score {
      font-weight: 600;
      color: #a5b4fc;
    }

    .highlight-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .highlight {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 14px;
    }

    .highlight .hl-label {
      font-size: 11px;
      color: #8b8fa8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .highlight.strong { border-color: #22c55e40; }
    .highlight.strong .hl-value { color: #22c55e; }
    .highlight.weak { border-color: #ef444440; }
    .highlight.weak .hl-value { color: #ef4444; }

    .hl-value {
      font-size: 15px;
      font-weight: 600;
    }

    .loading {
      text-align: center;
      color: #8b8fa8;
      padding: 20px;
      font-size: 15px;
    }

    .error-msg {
      color: #ef4444;
      font-size: 14px;
      margin-top: 8px;
    }

    /* --- Proctoring Report Section --- */
    .proctoring-report {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #2a2d3a;
    }

    .proctoring-report .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .proctoring-summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .proctor-stat {
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .proctor-stat .ps-value {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .proctor-stat .ps-label {
      font-size: 11px;
      color: #8b8fa8;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .proctor-stat.clean .ps-value { color: #22c55e; }
    .proctor-stat.warn .ps-value { color: #f59e0b; }
    .proctor-stat.danger .ps-value { color: #ef4444; }

    .violation-breakdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .violation-breakdown-item .vb-type {
      color: #e8e8e8;
      text-transform: capitalize;
    }

    .violation-breakdown-item .vb-count {
      color: #ef4444;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>Adaptive Assessment</h1>
    <p>Questions adapt to your level as you go. Answer carefully. Your session will be proctored via webcam.</p>

    <label for="domain-select">Select Domain</label>
    <select id="domain-select">
      <option value="AIML">AIML</option>
      <option value="Data Analyst">Data Analyst</option>
      <option value="Full Stack MERN">Full Stack MERN</option>
      <option value="DevOps">DevOps</option>
      <option value="Aptitude">Aptitude</option>
    </select>

    <label for="name-input">Your Name / Student ID</label>
    <input type="text" id="name-input" placeholder="e.g. Vasud_001" />

    <div id="start-error" class="error-msg"></div>
    <button class="btn-primary" onclick="startTest()">Begin Assessment</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <div class="quiz-layout">
      <div class="meta-row">
        <span class="band-badge" id="band-label">Intermediate</span>
        <span class="score-label" id="score-counter">0 / 0 correct</span>
      </div>

      <div class="question-text" id="question-text">Loading...</div>

      <div class="options-grid" id="options-grid"></div>

      <div class="feedback-row" id="feedback-row">
        <span id="feedback-text"></span>
      </div>

      <button class="next-btn" id="next-btn" onclick="loadNextQuestion()">
        Next Question →
      </button>

      <button class="btn-primary" id="finish-btn"
        style="display:none; margin-top:12px; background:#22c55e"
        onclick="finishTest()">
        Finish &amp; See Report
      </button>
    </div>
  </div>

  <!-- REPORT SCREEN -->
  <div id="report-screen">
    <h2>Assessment Complete</h2>

    <div class="score-big" id="report-score">—</div>
    <div class="performance-label" id="report-label">—</div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Correct</div>
        <div class="stat-value" id="report-correct">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Final Band</div>
        <div class="stat-value" id="report-band">—</div>
      </div>
    </div>

    <div class="highlight-box">
      <div class="highlight strong">
        <div class="hl-label">Strongest Topic</div>
        <div class="hl-value" id="report-strongest">—</div>
      </div>
      <div class="highlight weak">
        <div class="hl-label">Weakest Topic</div>
        <div class="hl-value" id="report-weakest">—</div>
      </div>
    </div>

    <div class="section-title">Topic Breakdown</div>
    <div id="topic-breakdown"></div>

    <!-- Proctoring Report Section -->
    <div class="proctoring-report" id="proctoring-report" style="display:none">
      <div class="section-title">🛡️ Proctoring Summary</div>
      <div class="proctoring-summary-grid" id="proctoring-summary-grid"></div>
      <div id="violation-breakdown"></div>
    </div>

    <button class="btn-primary" style="margin-top:28px" onclick="location.reload()">
      Take Another Test
    </button>
  </div>

</div>

<!-- Proctoring Webcam Panel (fixed position, top-right) -->
<div class="proctoring-panel" id="proctoring-panel">
  <div class="webcam-container">
    <video id="webcam-video" autoplay playsinline muted></video>
    <div class="webcam-status" id="webcam-status">
      <span class="dot"></span>
      <span>PROCTORING</span>
    </div>
    <div class="violation-counter" id="violation-counter">0</div>
  </div>
</div>

<!-- Hidden canvas for frame capture -->
<canvas id="capture-canvas" style="display:none"></canvas>

<!-- Violation Toast Container -->
<div class="violation-toast-container" id="toast-container"></div>

<script>
  const API = "http://127.0.0.1:8000";  // change this to your ngrok URL when sharing

  // --- Exam State ---
  let userEmail = null;
  let currentQuestion = null;
  let totalAnswered = 0;
  let totalCorrect = 0;
  let pendingNext = null;
  let questionCount = 0;
  const MAX_QUESTIONS = 10;

  // --- Proctoring State ---
  let proctoringSessionId = null;
  let webcamStream = null;
  let frameInterval = null;
  let totalViolations = 0;
  let proctoringData = null;  // store end-proctoring response

  // ===================== EXAM FUNCTIONS =====================

  async function startTest() {
    const domain = document.getElementById("domain-select").value;
    const name = document.getElementById("name-input").value.trim();
    document.getElementById("start-error").textContent = "";

    if (!name) {
      document.getElementById("start-error").textContent = "Please enter your name or student ID.";
      return;
    }

    // Use the name as the email/identifier for session tracking
    const email = name;

    try {
      // Step 1: Request webcam access for proctoring
      try {
        webcamStream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240, facingMode: "user" }
        });
        const videoEl = document.getElementById("webcam-video");
        videoEl.srcObject = webcamStream;
      } catch (camErr) {
        document.getElementById("start-error").textContent =
          "Camera access is required for proctored assessment. Please allow camera access and try again.";
        return;
      }

      // Step 2: Start the exam session
      const res = await fetch(`${API}/start_test`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, domain, start_band: "Intermediate" })
      });

      if (!res.ok) {
        const err = await res.json();
        document.getElementById("start-error").textContent = err.detail || "Failed to start test.";
        stopWebcam();
        return;
      }

      const data = await res.json();
      userEmail = data.email;
      currentQuestion = data.question;
      questionCount = 1;

      // Step 3: Start proctoring session
      await startProctoring(userEmail);

      // Step 4: Show quiz screen and proctoring panel
      document.getElementById("start-screen").style.display = "none";
      document.getElementById("quiz-screen").style.display = "block";
      document.getElementById("proctoring-panel").style.display = "block";
      renderQuestion(currentQuestion);

      // Step 5: Start periodic frame capture
      startFrameCapture();

    } catch (e) {
      document.getElementById("start-error").textContent = "Cannot connect to API. Is the server running?";
      stopWebcam();
    }
  }

  function renderQuestion(q) {
    document.getElementById("band-label").textContent = q.band;
    document.getElementById("score-counter").textContent =
      `${totalCorrect} / ${totalAnswered} correct`;
    document.getElementById("question-text").textContent = q.question;

    const letters = ["a", "b", "c", "d"];
    const optionTexts = [q.option_a, q.option_b, q.option_c, q.option_d];
    const grid = document.getElementById("options-grid");
    grid.innerHTML = "";

    optionTexts.forEach((text, i) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = `<span class="letter">${letters[i].toUpperCase()}</span> ${text}`;
      btn.onclick = () => submitAnswer(letters[i], btn);
      grid.appendChild(btn);
    });

    document.getElementById("feedback-row").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("finish-btn").style.display = "none";
  }

  async function submitAnswer(letter, clickedBtn) {
    // Disable all option buttons immediately
    document.querySelectorAll(".option-btn").forEach(b => b.disabled = true);

    try {
      const res = await fetch(`${API}/submit_answer`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: userEmail, answer: letter })
      });

      const data = await res.json();
      totalAnswered++;

      const feedback = document.getElementById("feedback-row");
      const feedbackText = document.getElementById("feedback-text");

      if (data.was_correct) {
        totalCorrect++;
        clickedBtn.classList.add("correct");
        feedbackText.textContent = "✓ Correct! Moving to a harder question.";
        feedback.className = "feedback-row correct";
      } else {
        clickedBtn.classList.add("wrong");
        feedbackText.textContent = `✗ Incorrect. Correct answer was ${data.correct_answer.toUpperCase()}.`;
        feedback.className = "feedback-row wrong";

        // Highlight the correct option
        const letters = ["a", "b", "c", "d"];
        document.querySelectorAll(".option-btn").forEach((btn, i) => {
          if (letters[i] === data.correct_answer) btn.classList.add("correct");
        });
      }

      feedback.style.display = "flex";
      pendingNext = data.next_question;

      // Show next or finish button
      if (questionCount >= MAX_QUESTIONS || !pendingNext) {
        document.getElementById("finish-btn").style.display = "block";
      } else {
        document.getElementById("next-btn").style.display = "block";
      }

    } catch (e) {
      alert("Error submitting answer. Check the server is running.");
    }
  }

  function loadNextQuestion() {
    if (!pendingNext) { finishTest(); return; }
    questionCount++;
    currentQuestion = pendingNext;
    pendingNext = null;
    renderQuestion(currentQuestion);
  }

  async function finishTest() {
    // Stop proctoring first
    stopFrameCapture();
    const procReport = await endProctoring();
    stopWebcam();

    document.getElementById("quiz-screen").style.display = "none";
    document.getElementById("proctoring-panel").style.display = "none";
    document.getElementById("report-screen").style.display = "block";
    document.getElementById("topic-breakdown").innerHTML =
      '<div class="loading">Generating report...</div>';

    try {
      const res = await fetch(`${API}/get_report/${userEmail}`);
      const data = await res.json();

      document.getElementById("report-score").textContent = `${data.score_percent}%`;
      document.getElementById("report-label").textContent = data.performance_label;
      document.getElementById("report-correct").textContent =
        `${data.correct_answers} / ${data.total_questions}`;
      document.getElementById("report-band").textContent = data.final_difficulty_band;
      document.getElementById("report-strongest").textContent = data.strongest_topic;
      document.getElementById("report-weakest").textContent = data.weakest_topic;

      const breakdown = document.getElementById("topic-breakdown");
      breakdown.innerHTML = "";
      for (const [topic, stats] of Object.entries(data.topic_breakdown)) {
        breakdown.innerHTML += `
          <div class="breakdown-item">
            <span class="topic-name">${topic}</span>
            <span class="topic-score">${stats.correct}/${stats.total} (${stats.score_percent}%)</span>
          </div>`;
      }
    } catch (e) {
      document.getElementById("topic-breakdown").innerHTML =
        '<div class="error-msg">Could not load report. Try again.</div>';
    }

    // Render proctoring report
    renderProctoringReport(procReport);
  }

  // ===================== PROCTORING FUNCTIONS =====================

  async function startProctoring(sessionId) {
    try {
      const res = await fetch(`${API}/proctoring/start`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId })
      });
      const data = await res.json();
      proctoringSessionId = data.proctoring_session_id;
      console.log("Proctoring started:", proctoringSessionId);
    } catch (e) {
      console.error("Failed to start proctoring:", e);
    }
  }

  async function endProctoring() {
    if (!proctoringSessionId) return null;

    try {
      const res = await fetch(`${API}/proctoring/end`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ proctoring_session_id: proctoringSessionId })
      });
      const data = await res.json();
      proctoringData = data;
      console.log("Proctoring ended:", data);
      return data;
    } catch (e) {
      console.error("Failed to end proctoring:", e);
      return null;
    }
  }

  function startFrameCapture() {
    // Capture and send a frame every 2 seconds
    frameInterval = setInterval(captureAndSendFrame, 2000);
  }

  function stopFrameCapture() {
    if (frameInterval) {
      clearInterval(frameInterval);
      frameInterval = null;
    }
  }

  async function captureAndSendFrame() {
    if (!proctoringSessionId || !webcamStream) return;

    const video = document.getElementById("webcam-video");
    const canvas = document.getElementById("capture-canvas");

    // Wait for video to be ready
    if (video.readyState < 2) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    // Convert to base64 JPEG
    const frameData = canvas.toDataURL("image/jpeg", 0.7);

    try {
      const res = await fetch(`${API}/proctoring/process_frame`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          proctoring_session_id: proctoringSessionId,
          frame_data: frameData
        })
      });

      if (!res.ok) return;

      const data = await res.json();

      // Update webcam status indicator
      updateWebcamStatus(data);

      // Show violation toasts
      if (data.has_violations) {
        for (const v of data.violations) {
          totalViolations++;
          showViolationToast(v);
        }
        updateViolationCounter();
      }

    } catch (e) {
      console.error("Frame processing error:", e);
    }
  }

  function updateWebcamStatus(data) {
    const statusEl = document.getElementById("webcam-status");
    if (data.has_violations) {
      const hasHigh = data.violations.some(v => v.severity === "high");
      if (hasHigh) {
        statusEl.className = "webcam-status danger";
        statusEl.querySelector("span:last-child").textContent = "VIOLATION";
      } else {
        statusEl.className = "webcam-status warning";
        statusEl.querySelector("span:last-child").textContent = "WARNING";
      }
      // Reset to normal after 3 seconds
      setTimeout(() => {
        statusEl.className = "webcam-status";
        statusEl.querySelector("span:last-child").textContent = "PROCTORING";
      }, 3000);
    }
  }

  function updateViolationCounter() {
    const counter = document.getElementById("violation-counter");
    counter.textContent = totalViolations;
    counter.style.display = totalViolations > 0 ? "flex" : "none";
  }

  function showViolationToast(violation) {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");

    const severityClass = violation.severity === "high" ? "" :
                          violation.severity === "medium" ? "medium" : "low";
    toast.className = `violation-toast ${severityClass}`;

    const icon = violation.severity === "high" ? "🚨" :
                 violation.severity === "medium" ? "⚠️" : "ℹ️";

    const label = getViolationLabel(violation.type);
    toast.innerHTML = `${icon} ${label}`;

    container.appendChild(toast);

    // Remove after animation completes
    setTimeout(() => {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 3200);
  }

  function getViolationLabel(type) {
    const labels = {
      "prohibited_object": "Prohibited object detected",
      "multiple_faces": "Multiple faces detected",
      "no_face": "No face detected — stay in frame",
      "gaze_away": "Looking away from screen",
      "lip_movement": "Lip movement detected",
      "speech_detected": "Speech detected"
    };
    return labels[type] || type;
  }

  function stopWebcam() {
    if (webcamStream) {
      webcamStream.getTracks().forEach(track => track.stop());
      webcamStream = null;
    }
  }

  function renderProctoringReport(report) {
    const section = document.getElementById("proctoring-report");
    if (!report) {
      section.style.display = "none";
      return;
    }

    section.style.display = "block";

    const totalViolationsCount = report.total_violations || 0;
    const framesProcessed = report.total_frames || 0;
    const violationTypes = Object.keys(report.violation_counts || {}).length;

    // Determine severity level for display
    let severityClass = "clean";
    let integrityLabel = "Clean";
    if (totalViolationsCount > 20) {
      severityClass = "danger";
      integrityLabel = "High Risk";
    } else if (totalViolationsCount > 5) {
      severityClass = "warn";
      integrityLabel = "Moderate";
    }

    const summaryGrid = document.getElementById("proctoring-summary-grid");
    summaryGrid.innerHTML = `
      <div class="proctor-stat ${severityClass}">
        <div class="ps-value">${integrityLabel}</div>
        <div class="ps-label">Integrity</div>
      </div>
      <div class="proctor-stat ${totalViolationsCount > 0 ? 'warn' : 'clean'}">
        <div class="ps-value">${totalViolationsCount}</div>
        <div class="ps-label">Violations</div>
      </div>
      <div class="proctor-stat">
        <div class="ps-value">${framesProcessed}</div>
        <div class="ps-label">Frames Analyzed</div>
      </div>
    `;

    const breakdownDiv = document.getElementById("violation-breakdown");
    breakdownDiv.innerHTML = "";

    if (report.violation_counts && Object.keys(report.violation_counts).length > 0) {
      for (const [type, count] of Object.entries(report.violation_counts)) {
        breakdownDiv.innerHTML += `
          <div class="violation-breakdown-item">
            <span class="vb-type">${getViolationLabel(type)}</span>
            <span class="vb-count">${count}</span>
          </div>`;
      }
    } else {
      breakdownDiv.innerHTML = `
        <div style="text-align:center; color:#22c55e; padding:12px; font-size:14px;">
          ✓ No violations detected during this session
        </div>`;
    }
  }
</script>
</body>
</html>
