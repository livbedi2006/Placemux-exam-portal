version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: examai_db
    restart: always
    environment:
      POSTGRES_DB: examai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: examai_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examai_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:secretpassword@db:5432/examai
      - SECRET_KEY=supersecretkeychangeinproduction1234567890
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: examai_frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
